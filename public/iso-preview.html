<!DOCTYPE html>
<html>
<head>
<title>Isometric Map Preview</title>
<style>
  body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  canvas { border: 2px solid #555; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const COLS = 20, ROWS = 16;
const TW = 48, TH = 24; // iso tile width/height
const DEPTH = 6;        // building wall depth

canvas.width  = (COLS + ROWS) * TW / 2 + 80;
canvas.height = (COLS + ROWS) * TH / 2 + 200;

const OX = ROWS * TW / 2 + 40; // origin x (top of diamond grid)
const OY = 40;                  // origin y

// Map layout (roughly mirroring the screenshot)
// R=river, G=grass, T=tree, D=dock
const terrain = [];
for (let r = 0; r < ROWS; r++) {
  for (let c = 0; c < COLS; c++) {
    let t = "G";
    // River — diagonal band on right side
    if ((c >= 14 && r <= c - 8) || (c >= 16)) t = "R";
    if (c === 14 && r >= 6 && r <= 10) t = "R";
    if (c === 13 && r >= 8 && r <= 10) t = "R";
    if (c >= 14 && r >= 10) t = "R";
    terrain[r * COLS + c] = t;
  }
}

// Buildings: { col, row, w, h, roof, label }
const buildings = [
  { col: 8,  row: 2,  w: 2, h: 2, roof: "#7a3838", label: "Tavern" },
  { col: 1,  row: 7,  w: 2, h: 2, roof: "#b0a898", label: "Church" },
  { col: 6,  row: 9,  w: 1, h: 1, roof: "#484848", label: "Smithy" },
  { col: 6,  row: 11, w: 1, h: 1, roof: "#806050", label: "General" },
  { col: 1,  row: 11, w: 1, h: 1, roof: "#606060", label: "Well" },
  { col: 15, row: 6,  w: 3, h: 3, roof: "#3a5080", label: "Castle" },
  { col: 13, row: 13, w: 2, h: 2, roof: "#806850", label: "Stable" },
  { col: 2,  row: 13, w: 1, h: 1, roof: "#4a5878", label: "House" },
  { col: 4,  row: 13, w: 1, h: 1, roof: "#4a5878", label: "House" },
];

// Trees
const trees = [
  [1,1],[2,2],[1,3],[3,1],[17,1],[18,2],[16,2],
  [7,6],[9,11],[3,5],[11,7],[5,7]
];

function toIso(col, row) {
  return {
    x: OX + (col - row) * TW / 2,
    y: OY + (col + row) * TH / 2
  };
}

function drawTile(col, row, fill, stroke) {
  const p = toIso(col, row);
  ctx.beginPath();
  ctx.moveTo(p.x,          p.y);
  ctx.lineTo(p.x + TW / 2, p.y + TH / 2);
  ctx.lineTo(p.x,          p.y + TH);
  ctx.lineTo(p.x - TW / 2, p.y + TH / 2);
  ctx.closePath();
  ctx.fillStyle = fill;
  ctx.fill();
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 0.4; ctx.stroke(); }
}

function drawBuilding(col, row, w, h, roofColor, wallColor, label) {
  // Collect all top-face corners for the footprint
  const tl = toIso(col,     row);
  const tr = toIso(col + w, row);
  const br = toIso(col + w, row + h);
  const bl = toIso(col,     row + h);

  const bh = DEPTH * (w + h); // visual wall height

  // South wall (front-left face)
  ctx.beginPath();
  ctx.moveTo(bl.x,         bl.y);
  ctx.lineTo(bl.x - TW/2,  bl.y + TH/2);
  ctx.lineTo(bl.x - TW/2,  bl.y + TH/2 + bh);
  ctx.lineTo(bl.x,         bl.y + bh);
  ctx.closePath();
  ctx.fillStyle = shadeColor(wallColor, -25);
  ctx.fill();
  ctx.strokeStyle = "#1a1a14"; ctx.lineWidth = 0.8; ctx.stroke();

  // East wall (front-right face)
  ctx.beginPath();
  ctx.moveTo(bl.x,         bl.y);
  ctx.lineTo(br.x,         br.y);
  ctx.lineTo(br.x,         br.y + bh);
  ctx.lineTo(bl.x,         bl.y + bh);
  ctx.closePath();
  ctx.fillStyle = shadeColor(wallColor, -10);
  ctx.fill();
  ctx.strokeStyle = "#1a1a14"; ctx.lineWidth = 0.8; ctx.stroke();

  // Roof (top face)
  ctx.beginPath();
  ctx.moveTo(tl.x, tl.y);
  ctx.lineTo(tr.x, tr.y);
  ctx.lineTo(br.x, br.y);
  ctx.lineTo(bl.x, bl.y);
  ctx.closePath();
  ctx.fillStyle = roofColor;
  ctx.fill();
  ctx.strokeStyle = "#1a1a14"; ctx.lineWidth = 0.8; ctx.stroke();

  // Label above
  if (label) {
    const cx = (tl.x + tr.x + br.x + bl.x) / 4;
    const cy = Math.min(tl.y, tr.y) - 10;
    ctx.font = "italic 9px Georgia, serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "bottom";
    const tw = ctx.measureText(label).width;
    ctx.fillStyle = "rgba(0,0,0,0.55)";
    ctx.fillRect(cx - tw/2 - 2, cy - 11, tw + 4, 13);
    ctx.fillStyle = "#fff";
    ctx.fillText(label, cx, cy);
  }
}

function drawTree(col, row) {
  const p = toIso(col, row);
  const cx = p.x, cy = p.y + TH / 2;
  // Trunk
  ctx.strokeStyle = "#7a5a30"; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx, cy - 14); ctx.stroke();
  // Canopy
  ctx.fillStyle = "rgba(80,110,70,0.85)";
  ctx.beginPath();
  ctx.arc(cx, cy - 16, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = "#2a3a20"; ctx.lineWidth = 0.6; ctx.stroke();
}

function shadeColor(hex, amt) {
  const r = Math.max(0, Math.min(255, parseInt(hex.slice(1,3),16) + amt));
  const g = Math.max(0, Math.min(255, parseInt(hex.slice(3,5),16) + amt));
  const b = Math.max(0, Math.min(255, parseInt(hex.slice(5,7),16) + amt));
  return `rgb(${r},${g},${b})`;
}

// ── Draw ──────────────────────────────────────────────────────────────────────

// Background
ctx.fillStyle = "#f0f0ee";
ctx.fillRect(0, 0, canvas.width, canvas.height);

// Tiles (back to front: low col+row first)
const order = [];
for (let r = 0; r < ROWS; r++)
  for (let c = 0; c < COLS; c++)
    order.push({ c, r, sum: c + r });
order.sort((a, b) => a.sum - b.sum);

for (const { c, r } of order) {
  const t = terrain[r * COLS + c];
  if (t === "R") {
    drawTile(c, r, "#cce0ee", "rgba(20,60,150,0.2)");
  } else {
    drawTile(c, r, "#FAFCF7", "rgba(0,0,0,0.08)");
  }
}

// Trees (before buildings so buildings overlap)
for (const [c, r] of trees) {
  drawTree(c, r);
}

// Buildings (sorted back to front)
const sortedBuildings = [...buildings].sort((a, b) => (a.col + a.row) - (b.col + b.row));
for (const b of sortedBuildings) {
  drawBuilding(b.col, b.row, b.w, b.h, b.roof, "#f0f0ec", b.label);
}

// Title
ctx.font = "bold 18px Georgia, serif";
ctx.textAlign = "center";
ctx.fillStyle = "#102341";
ctx.fillText("Firston", canvas.width / 2, canvas.height - 12);

// Border
ctx.strokeStyle = "#AC181C"; ctx.lineWidth = 2;
ctx.strokeRect(3, 3, canvas.width - 6, canvas.height - 6);
</script>
</body>
</html>
