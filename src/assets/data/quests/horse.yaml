- id: horse
  name: A Man About a Horse and a Horse
  icon: '<i class="ra ra-compass"></i>'
  explorerMapId: horse_quest
  tavernHint: "My horse was taken. Tracks go east into the Thornwood. Good reward offered for her return."
  combatType: Talking Horse
  combatEmoji: "🐴"
  turnInGold: 100
  turnInScrap: 4
  rewardLabel: "The horse is returned. Claim your 100g and 4 Scrap Metal."
