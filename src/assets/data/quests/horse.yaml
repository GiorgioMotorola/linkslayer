  leaveLog: "You turn back from the Thornwood. The man will have to find someone else. The notice remains on the board."
  turnInLog: "You tell the man the whole story. His expression moves through disbelief, relief, and finally something he can't quite name. He counts out a hundred gold pieces and presses them into your hand. You walk away down the road. You are perhaps thirty yards off when you hear it, from somewhere behind you: 'Thank you.' The man is too far away to have said it. <em>A Man About a Horse and a Horse</em> — complete."
  steps:
    - scene: "A traveler on the road steps into your path, hat in hand. 'Beg your pardon,' he says. 'My horse was taken last night. She was stabled outside the inn and was gone by morning. I followed the tracks as far as the Vinewoods Pass before I lost my nerve. The tracks go east, into the trees. There's a clearing not far in.' He holds your gaze. 'I'd pay good coin to have her back.'"
      choices:
        - text: Follow the tracks into the Thornwood
          next: open_explorer
        - text: You can't help him
