- id: npc_005
  name: Fairwyn the Tongueless
  greeting: "FAIRWYN THE TONGUELESS: Oouu eeeahh ouu. Eerrr eh ah eehahee..."
  options:
    - text: "'Did you say 'Look behind you, there is an enemy?'"
      result: combat
      responseText: There was, in fact, an enemy behind you.
    - text: "'Out of the way, peck.'"
      result: damage
      responseText: You should have listened. An enemy appears, hits you with its claws, and runs away. You take damage.
    - text: "'What?'"
      result: damage
      responseText: You should have listened. An enemy appears, hits you with its claws, and runs away. You take damage.
    - text: "'I believe you with all of my soul even if I didn't understand what you said.'"
      result: item
      details: health
      responseText: "You must have rested well last night because you knew what he meant before his tongueless mouth started flapping. You take your weapon and dig it into the enemy's skull, immediately dropping it back into the hell it came from, and you gain +5 HP."

- id: npc_007
  name: Suttree The Old Mage
  greeting: "SUTTREE THE OLD MAGE: You look tired, traveler. Care for some arcane tea?"
  options:
    - text: Accept the tea
      result: special
      details: recover
      amount: 1
      responseText: You feel energy surging through your veins.
    - text: Decline politely
      result: none
      responseText: You nod respectfully and continue on your way.
    - text: Decline rudely
      result: none
      responseText: You nod disrespectfully and continue on your way.
    - text: Out of distrust of the world you live in, punch the Old Mage in the face.
      result: damage-minor
      responseText: "The Mage doesn't seem to move or appear affected by your attack. However, your fist now aches. You move on awkwardly, losing -1 damage."

- id: npc_009
  name: The Lost Bartender
  greeting: "THE LOST BARTENDER: Howdy, sir. How has your journey been? Never mind, forget I asked. Asking a man a question is the biggest true form of weakness, and I have been known to be a strong guy. Here, have a rip of this swill, won't you? I also have knives and guns and bullets you can drink if you want to."
  options:
    - text: Take a rip of the swill
      result: item
      details: health
      responseText: Goes down smooth. Rips ya up on the inside in a good way.
    - text: Drink the guns, knives, and bullets.
      result: damage
      responseText: "THE LOST BARTENDER: Honestly, what did you expect? That's on you."
    - text: Take the guns, knives, and bullets and duct tape them to your chainmail gloves.
      result: item
      details: shield
      responseText: "THE LOST BARTENDER: Very interesting."
    - text: Politely decline.
      result: none
      responseText: "THE LOST BARTENDER: Not even one knife? Okay then, pal."

- id: npc_010
  name: Ron Von Zarovich
  greeting: "RON VON ZAROVICH: Bobby Lasagna is not to be trusted. I would sooner trust Strahd Von Zarovich over Bobby L. She lives in a hut and she killed my friend Bulgresh who once turned into a T-Rex."
  dialogueNodes:
    start:
      text: "RON VON ZAROVICH: Bobby Lasagna is not to be trusted. I would sooner trust Strahd Von Zarovich over Bobby L. She lives in a hut and she killed my friend Bulgresh who once turned into a T-Rex."
      options:
        - text: "'I am sorry for your loss.'"
          flow: close_encounter
          result: item
          details: health
          responseText: "RON VON ZAROVICH: Wow... Is this loss?"
        - text: "'I could kill her for you.'"
          flow: dialogue_branch
          next_node_id: kill_offer_confirmation
        - text: "'You shouldn't talk about your relations that way.'"
          flow: close_encounter
          result: none
          responseText: "RON VON ZAROVICH: You don't understand."
        - text: "'Well, if you think you are going to die, then maybe I can have your gold.'"
          flow: close_encounter
          effect: item
          details: gold
          amount: 15
          responseText: "RON VON ZAROVICH: Sure. What does it matter? These are the end times."
    kill_offer_confirmation:
      text: "RON VON ZAROVICH: Are you sure? She is pretty dangerous..."
      options:
        - text: Yes. Bulgresh must be avenged. Tell me where she is and I will make her suffer.
          flow: dialogue_branch
          next_node_id: bobby_location
        - text: Actually, never mind. She sounds scary if she killed a T-Rex.
          flow: close_encounter
          responseText: "RON VON ZAROVICH: As you wish. Perhaps it's for the best."
    bobby_location:
      text: "RON VON ZAROVICH: She is through that pass, over where Berez used to stand, before it was flooded. Be careful, though... those lands are poisoned."
      options:
        - text: Walk toward the pass.
          flow: dialogue_branch
          next_node_id: approach_pass
        - text: Actually, never mind.
          flow: close_encounter
          responseText: "RON VON ZAROVICH: A wise choice. Perhaps some other time."
    approach_pass:
      text: "You approach the pass. You see a small, green-colored stream. Steam rises and bubbles. The air seems to wobble and your nostrils sting."
      options:
        - text: Walk through the stream.
          flow: dialogue_branch
          effect: damage-minor
          amount: 10
          responseText: "You wade through the sickly green stream, feeling a strange tingle as you lose 10 health points. The poisoned waters are already taking their toll."
          next_node_id: approach_hut
        - text: Turn around and continue your adventure without facing Bobby Lasagna.
          flow: close_encounter
          responseText: You decide against braving the poisoned lands and turn back, seeking less perilous adventures.
    approach_hut:
      text: "You approach a hut after walking for some time. The hut looks old and gnarled. There appears to be large footsteps all around the hut."
      options:
        - text: "Knock on the hut's door."
          result: mini_boss_combat
          miniBossType: "Bobby Lasagna's Hut"
          responseText: The hut groans, grows legs right before your eyes and begins to attack. You are now in combat with a living, breathing hut.
        - text: Search the area for Bobby.
          flow: dialogue_branch
          effect: damage-minor
          amount: 10
          responseText: You meticulously search the overgrown surroundings, finding no immediate sign of Bobby. However, a hidden thorn bush snags your leg, dealing 10 damage.
          next_node_id: rustling_bushes
        - text: "Yell 'Hey Bobby. I'm ready to avenge Bulgresh.'"
          result: mini_boss_combat
          miniBossType: Bobby Lasagna
          responseText: "Your voice echoes through the silent woods. From the hut, a figure emerges. 'Bulgresh, you say? He had it coming. Prepare to join him.'"
    rustling_bushes:
      text: You hear rustling in the bushes nearby...
      options:
        - text: Ready yourself for combat.
          result: mini_boss_combat
          miniBossType: Bobby Lasagna
          responseText: "You brace yourself. Bobby Lasagna bursts from the foliage, her eyes alight with fury. 'So, you've come to meddle, have you?' Combat begins."
        - text: Run.
          flow: close_encounter
          responseText: You decide discretion is the better part of valor and bolt, leaving the mysterious rustling and Bobby Lasagna's domain behind.

- id: npc_020_fishing_lesson
  name: Old Man Francis
  greeting: "Ahoy there. I'm Man Francis. Some people call me Old Man Francis. Kind of Rude if you ask me but if the Pince-nez fits. I don't really wear glasses but, anyway, How is your day?"
  type: npc
  dialogueNodes:
    start:
      text: "Ahoy there. I'm Man Francis. Some people call me Old Man Francis. Kind of Rude if you ask me but if the Pince-nez fits. I don't really wear glasses but, anyway, How is your day?"
      options:
        - text: Teach me how to fish, please.
          flow: dialogue_branch
          next_node_id: lesson_1
        - text: Can you just give me a fish for the day?
          flow: close_encounter
          responseText: "Old Man Francis sighs. 'I haven't caught anything for the day. Here is some bark tea instead.'"
          effect: inventoryItem
          details: barkTea
        - text: "Sorry, I didn't mean to engage in this conversation. I have a world to save."
          flow: close_encounter
          responseText: Old Man Francis shrugs and turns back to the sea.
    lesson_1:
      text: "'Oh yeah I can do that. First, you need a good spot. Not too deep, not too shallow. Got it?'"
      options:
        - text: Got it.
          flow: dialogue_branch
          next_node_id: lesson_2
        - text: This is too complicated. I give up.
          flow: close_encounter
          responseText: "Old Man Francis sighs. 'Some folks just ain't cut out for it.'"
    lesson_2:
      text: "'Next, the bait. Worms, crickets, maybe a shiny lure. Maybe even some goblin slime. Depends on what yer after. Understand?'"
      options:
        - text: Understood.
          flow: dialogue_branch
          next_node_id: lesson_3
        - text: "I'm losing patience. I give up."
          flow: close_encounter
          responseText: "Old Man Francis shakes his head. 'Patience is key, patience is key.'"
    lesson_3:
      text: "'Then, the cast. A smooth, gentle flick of the wrist. Not too hard, not too soft. But not too not not hard or soft. Basically in the middle. Think you can do it?'"
      options:
        - text: I think so.
          flow: dialogue_branch
          next_node_id: lesson_4
        - text: This is harder than it looks. I give up.
          flow: close_encounter
          responseText: "Old Man Francis chuckles. 'Practice makes perfect. Or in this case, practice makes a person give up.'"
    lesson_4:
      text: "'Now, the waiting game. That's where most folks fail. Just watch for any action on the line or the bobber. Got the patience for it?'"
      options:
        - text: "I can wait, I guess."
          flow: dialogue_branch
          next_node_id: lesson_5
        - text: This is boring. I give up.
          flow: close_encounter
          responseText: "Old Man Francis yawns. 'Not everyone's built for the quiet life.'"
    lesson_5:
      text: "'If you get a bite, you'll reel that son of a gun in confidently but with caution. Are you ready?'"
      options:
        - text: "I am not sure I am rea-"
          flow: dialogue_branch
          next_node_id: lesson_6
        - text: This is a lot of pressure. I give up.
          flow: close_encounter
          responseText: "Old Man Francis sighs. 'The big ones always get away from the faint of heart.'"
    lesson_6:
      text: "'The current, now. She's a tricky beast. Learn to cast with it, not against it. It'll take your bait right where the fish are hiding. Understand the flow?'"
      options:
        - text: "I'm not sure I am following your logi-'"
          flow: dialogue_branch
          next_node_id: lesson_7
        - text: This is getting too deep. I give up.
          flow: close_encounter
          responseText: "Old Man Francis shakes his head. 'The river don't wait for no one.'"
    lesson_7:
      text: "'Weather signs. A storm brewin', fish go deep. A gentle drizzle, they might come up. Look to the sky, and listen to the air. What do you see?'"
      options:
        - text: "I see a lot of water and some clouds in the sky. I see you. I smell you, too."
          flow: dialogue_branch
          next_node_id: lesson_8
        - text: "I'm not a weather wizard. I give up."
          flow: close_encounter
          responseText: "Old Man Francis shrugs. 'Then ye'll be fishin' in the wrong storms.'"
    lesson_8:
      text: "'The art of chumming. A little bit of food, scattered just so, can bring 'em right to you. Don't overdo it, though, or they'll be full. Got the knack?'"
      options:
        - text: The knack?
          flow: dialogue_branch
          next_node_id: lesson_9
        - text: I don't want to waste bait. I give up.
          flow: close_encounter
          responseText: "Old Man Francis sighs. 'Sometimes you gotta give a little to get a lot.'"
    lesson_9:
      text: "'Reading the water's surface. Ripples from a rising fish, bugs skittering... it all tells a story. Are you reading the water yet?'"
      options:
        - text: I don't much care for reading.
          flow: dialogue_branch
          next_node_id: lesson_10
        - text: It all looks the same to me. I give up.
          flow: close_encounter
          responseText: "Old Man Francis nods. 'Not everyone sees the hidden tales.'"
    lesson_10:
      text: "'It's important to understand the yank of the fish. Sometimes the fish will be a big ol' goofball and that means you have to put in what the fish is hitting you with. You have to feel it."
      options:
        - text: "I'll focus on the feel. Do you have any beer to go with this?"
          flow: dialogue_branch
          next_node_id: lesson_11
        - text: My hands are numb. I give up.
          flow: close_encounter
          responseText: "Old Man Francis chuckles. 'Then ye'll miss the subtle whispers.'"
    lesson_11:
      text: "'I don't drink. Choosing your hook size. Too big, they won't bite. Too small, they'll get away. It's a delicate balance. Think you can pick the right one?'"
      options:
        - text: "I'll pick carefully."
          flow: dialogue_branch
          next_node_id: lesson_12
        - text: This is too much detail. I give up.
          flow: close_encounter
          responseText: "Old Man Francis shrugs. 'The details make the difference.'"
    lesson_12:
      text: "'The art of the retrieve. Slow, steady, or wobbling? Depends on the fish, depends on the lure. Every retrieve tells a story. What's your story?'"
      options:
        - text: "I'm on an adventure. What is your story?"
          flow: dialogue_branch
          next_node_id: lesson_13
        - text: "I'm just reeling. I give up."
          flow: close_encounter
          responseText: "Old Man Francisr sighs. 'Then ye'll only catch the lazy ones.'"
    lesson_13:
      text: "'I am a fisherman.'"
      options:
        - text: "Oh, that's nice."
          flow: dialogue_branch
          next_node_id: lesson_14
        - text: I'm done. I give up.
          flow: close_encounter
          responseText: "Old Man Francis nods. 'Some lessons are learned only through waiting and getting to know your fellow fisherman.'"
    lesson_14:
      text: "'Anyway, the moon's phases. Some say a full moon brings the fish out, others say it drives 'em deep. It's a mystery, but one worth pondering. What do you think?'"
      options:
        - text: "I could see a full moon doing something to a fish, I suppose."
          flow: dialogue_branch
          next_node_id: lesson_15
        - text: "I'm not an astrologer. I give up."
          flow: close_encounter
          responseText: "Old Man Francis chuckles. 'The sky holds many secrets, not just for fish.'"
    lesson_15:
      text: "'Understanding the fish's natural habitat. Rocks, weeds, sunken logs... they all provide cover. Cast near 'em, but not in 'em.'"
      options:
        - text: You sure you don't drink?
          flow: dialogue_branch
          next_node_id: lesson_16
        - text: I keep getting snagged. I give up.
          flow: close_encounter
          responseText: "Old Man Francis sighs. 'The best spots are often the trickiest.'"
    lesson_16:
      text: "'Yes, I am sure. The sound of the water. A gentle lapping, a rushing stream... different sounds mean different things. Listen closely. What do you hear?'"
      options:
        - text: "I hear you, to be quite honest."
          flow: dialogue_branch
          next_node_id: lesson_17
        - text: It's just noise to me. I give up.
          flow: close_encounter
          responseText: "Old Man Francis shakes his head. 'The sea sings a song, if you listen.'"
    lesson_17:
      text: "'The importance of camouflage. Your shadow, your bright clothes... they can spook the fish. Blend in with nature.'"
      options:
        - text: "Got it. I won't wear my neon colored scarf while fishing."
          flow: dialogue_branch
          next_node_id: lesson_18
        - text: I like my bright clothes. I give up.
          flow: close_encounter
          responseText: "Old Man Francis shrugs. 'Then you'll be seen, and the fish will flee.'"
    lesson_18:
      text: "'Not to get too philosophic but this is what it's all about. The wash of the waves, the peaceful breeze, the potential fish to be caught, eating the bait when no one is looking...'"
      options:
        - text: Yeah, I get that.
          flow: dialogue_branch
          next_node_id: lesson_19
        - text: Eating bait is pretty gross. I give up.
          flow: close_encounter
          responseText: "Old Man Francis sighs. 'Suit yourself.'"
    lesson_19:
      text: "'Wait... I think you have something. I think you have something.'"
      options:
        - text: Reel in the fish using the lessons you have learned.
          flow: dialogue_branch
          next_node_id: lesson_20
        - text: Throw your fishing pole into the sea.
          flow: close_encounter
          responseText: "Old Man Francis smiles sadly. 'Why did you do that?'"
    lesson_20:
      text: "'You got it. Thats the biggest fish I have seen in a long while. I bet that fish ages well with age.'"
      options:
        - text: Receive the Fish of Eternal Enlightenment
          flow: close_encounter
          effect: inventoryItem
          details: enlightenmentFish
          responseText: You receive The Fish of Eternal Enlightenment. It shimmers with ancient power.

- id: npc_020_kidnapped_encounter
  name: The Fallen Tree
  greeting: A quiet walk through the woods is shattered by a desperate scream for help. You follow the sound, finding a person pinned beneath a large, fallen tree. The person is struggling, their face a mask of pain. Their voice is weak, pleading for you to help them.
  dialogueNodes:
    start:
      text: A quiet walk through the woods is shattered by a desperate scream for help. You follow the sound, finding a person pinned beneath a large, fallen tree. The person is struggling, their face a mask of pain. Their voice is weak, pleading for you to help them.
      options:
        - text: Attempt to lift the tree off the person.
          flow: dialogue_branch
          next_node_id: kidnapped_start
        - text: Ask the person for their name.
          flow: dialogue_branch
          next_node_id: kidnapped_start
        - text: Steal the person's gold.
          flow: dialogue_branch
          next_node_id: kidnapped_start
        - text: Walk away as if you didn't hear anything at all.
          flow: close_encounter
          responseText: "You turn and walk away, the scream fading behind you. Best not to get involved."
    kidnapped_start:
      text: "As you get closer, you feel a sharp pain on the back of your head. The lights go out, and your consciousness drifts away."
      options:
        - text: Drift into a dream.
          flow: dialogue_branch
          next_node_id: dream_sequence
    dream_sequence:
      text: "You dream of a time long ago, safe and sound at your parents' old peat-covered lakehouse. You are young again, chasing squirrels and helping your father chop wood by the shore. Everything is calm. You are safe. You are safe."
      options:
        - text: Wake up from the dream.
          flow: dialogue_branch
          next_node_id: wakeup
    wakeup:
      text: "You wake up with a jolt, a dull ache throbbing in your head. You are tied to a chair with ropes in a dimly lit, underground bunker. A closed metal door sits opposite you. At a nearby table, a man is sitting, calmly cutting up an apple with a knife and eating the pieces."
      options:
        - text: Attempt to stand up.
          flow: dialogue_branch
          next_node_id: wakeup_stand
        - text: "Scream, 'Where am I?! Who are you?!'"
          flow: dialogue_branch
          next_node_id: dialogue_route
        - text: Offer your gold to be released.
          flow: dialogue_branch
          next_node_id: wakeup_gold
        - text: Threaten to kill the man.
          flow: dialogue_branch
          next_node_id: choke_event
        - text: Say nothing and stare at the man.
          flow: dialogue_branch
          next_node_id: wakeup_stare
    wakeup_stand:
      text: "You strain against the ropes, attempting to stand, but the chair topples over. The man sighs, gets up, and without a word, rights the chair and you back up straight."
      options:
        - text: Continue
          flow: dialogue_branch
          next_node_id: wakeup
    wakeup_gold:
      text: "'Oh, don't worry,' he says, 'we plan on stealing everything from you no matter how this turns out.'"
      options:
        - text: Continue
          flow: dialogue_branch
          next_node_id: wakeup
    wakeup_stare:
      text: You stare at the man. The man continues to stare at his apple, taking another bite.
      options:
        - text: Continue
          flow: dialogue_branch
          next_node_id: wakeup
    dialogue_route:
      text: "The man stops cutting his apple, puts the knife on the table, and meets your gaze. 'Me? I'm nobody. You? You're a ransom toward a big payday.'"
      options:
        - text: "'Ransom?! I'm nobody!'"
          flow: dialogue_branch
          next_node_id: dialogue_route_2
        - text: "'You'll pay for this!'"
          flow: dialogue_branch
          next_node_id: dialogue_route_3
    dialogue_route_2:
      text: "'We have been following you,' he says, a small smile playing on his lips. 'We've seen you talk to Lords and Kings on your journey. You are definitely somebody. and we plan to get a big payday for you.'"
      options:
        - text: Continue the encounter.
          flow: dialogue_branch
          next_node_id: wakeup
    dialogue_route_3:
      text: "'You mean your Kings and noblepeople will pay us for this?' he replies with a sneer."
      options:
        - text: Continue the encounter.
          flow: dialogue_branch
          next_node_id: wakeup
    choke_event:
      text: "The man laughs, puts a piece of apple in his mouth, starts chewing, and stands up. He walks over to you, pointing the knife at your throat. With a mouth full of apple, he says, 'Yeah... very funny. I'm not the one tied u-' He suddenly starts choking, grabbing his throat. He falls down, flailing on the ground, and soon enough, the life leaves his body. His knife clatters to the floor."
      options:
        - text: Fall on the ground near the knife to cut your ropes free.
          flow: dialogue_branch
          next_node_id: freedom_options
    freedom_options:
      text: "After a struggle, you manage to cut yourself free. You stand up, your legs still a little unsteady, and look around the bunker. The metal door is your only way out."
      options:
        - text: Open the door.
          flow: dialogue_branch
          next_node_id: open_door
    open_door:
      text: "You open the metal door, revealing a small hallway. You can go left or right."
      options:
        - text: Go left.
          flow: dialogue_branch
          next_node_id: go_left
        - text: Go right.
          flow: dialogue_branch
          next_node_id: go_right
    go_left:
      text: You hear a loud clanking of ale glasses and loud, drunken voices through a closed door on the left.
      options:
        - text: Kick the door down and get your revenge for ruining a nice day.
          result: mini_boss_combat
          miniBossType: Drunken Kidnappers
          responseText: "You smash the door off its hinges, revealing a room full of rowdy, startled kidnappers. They all turn to face you."
        - text: Turn around and go right instead.
          flow: dialogue_branch
          next_node_id: go_right
    go_right:
      text: You see a set of stairs leading up to a cellar door.
      options:
        - text: Turn around and go the other way.
          flow: dialogue_branch
          next_node_id: go_left
        - text: Go through the cellar door.
          flow: close_encounter
          responseText: "You carefully open the cellar door and slip outside, into the cool night air. You are free."
