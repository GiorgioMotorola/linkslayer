- id: npc_hermit_crane
  name: Old Crane
  greeting: "The hermi opens the door before you knock and invites you in. 'Sit,' she says, pointing at a chair that isn't there. You sit anyway. She looks at your hands for a long time. 'You've killed something recently,' she says. 'Or you're about to.'"
  options:
    - text: Ask about the road ahead
      result: none
      responseText: "She says something is waiting that you will not see coming. She does not say more."
    - text: Ask her to read your future - 20g
      result: read_log
      cost: 20
    - text: Leave immediately
      result: none
      responseText: "She calls after you: 'Watch out for that group of bandits tomorrow...'"
