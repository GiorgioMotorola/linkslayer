- id: campfire_cliffside
  name: Cliffside Campfire
  greeting: "High on the cliffside, someone has built a fire in a ring of stones. The flames snap in the wind off the ridge. Below, the world stretches out in every direction. You could rest here."
  options:
    - text: Settle in and rest by the fire.
      result: campfire_rest
      campfireName: Cliffside Campfire
      responseText: You sit by the fire.
    - text: Keep moving along the ridge.
      result: none
      responseText: You continue on.

- id: campfire_beach
  name: Beach Campfire
  greeting: "A fire burns low on the sand, above the tide line. The waves come in and pull back in a slow, even rhythm. Driftwood crackles and spits sparks into the dark. You could rest here."
  options:
    - text: Settle in and rest by the fire.
      result: campfire_rest
      campfireName: Beach Campfire
      responseText: You sit by the fire.
    - text: Keep moving along the shore.
      result: none
      responseText: You continue on.

