- id: lore_ghost_tavern
  name: The Abandoned Tavern
  dialogueNodes:
    start:
      text: "You come across a worn-down tavern on the side of the road. As you approach, the door swings open on its own. Inside, you can see nothing: no candles, no fire, no movement. No life."
      options:
        - text: Go inside.
          flow: dialogue_branch
          next_node_id: inside
        - text: Walk past. Some doors are best left unopened.
          flow: close_encounter
          responseText: "The door swings shut behind you as you pass. You don't look back."
        - text: 🗺️ Come back later.
          result: come_back_later
          responseText: "This point of interest has been marked on your map."
    inside:
      text: "The moment you step through the door, the place booms to life: laughter, clinking glasses, the warm smell of ale and woodsmoke. And yet... no one looks at you. No one acknowledges you. The noise continues as if you aren't there. It feels dreary. Almost lifeless. Wrong."
      options:
        - text: Explore the tavern.
          result: open_explorer
          mapId: abandonedtavern

- id: lore_018
  name: The Speaking Stone
  text: "There appears to be a stone block with a hole carved into it. The hole appears to be worn away while the rest of the block seems to be smooth. While staring at the block, you hear the sound of a voice that shouts 'Halt, trespasser. If you come any closer, you better tell me how fast you want to die.'"
  options:
    - text: Test the voice and take one small step forward.
      result: item
      details: poison
      amount: 10
      damage: 1
      responseText: "The voice shouts 'I warned you.' and spits a small dose of poison from the hole in the stone block."
    - text: Decide the voice is bluffing and start running toward the stone block with your weapon.
      result: item
      details: poison
      amount: 10
      damage: 2
      responseText: "The voice shouts 'I warned you.' and spits a medium dose of poison from the hole in the stone block."
    - text: "'Oh yeah? What are you going to do... spit a large dose of poison from that hole in the stone block?'"
      result: item
      details: poison
      amount: 15
      damage: 2
      responseText: The voice spits a large dose of poison from the hole in the stone block.
    - text: Turn around and walk away.
      result: none
      responseText: "The voice yells 'Yeah, you better walk away.'"
    - text: 🗺️ Come back later.
      result: come_back_later
      responseText: "This point of interest has been marked on your map."

- id: lore_021_whispering_well
  name: The Whispering Well
  dialogueNodes:
    start:
      text: "You discover an ancient stone well, strangely overgrown with a gnarled, moss-covered tree that seems to sprout directly from its depths."
      options:
        - text: Use the tree to climb down the well.
          flow: dialogue_branch
          next_node_id: well_bottom
        - text: Walk away. Some mysteries are best left alone.
          flow: close_encounter
          responseText: You decide the well holds more trouble than treasure and continue on your journey.
        - text: 🗺️ Come back later.
          result: come_back_later
          responseText: "This point of interest has been marked on your map."
    well_bottom:
      text: "You touch down into shallow, cool water. The air is damp, and a faint light reveals a narrow tunnel leading away from the bottom of the well. The tunnel seems to lead towards a distant, flickering light and the faint sounds of voices."
      options:
        - text: Follow the tunnel cautiously towards the light.
          result: open_explorer
          mapId: whisperingwell
        - text: Walk through the tunnel yelling and screaming like a crazy person.
          result: mini_boss_combat
          miniBossType: Lich Apprentice
          responseText: "Your shouts echo, and a monstrous growl answers. A hulking figure bursts from the shadows, ready for a fight."
        - text: Climb back out of the well.
          flow: close_encounter
          responseText: "The well's depths are too unsettling. You carefully climb back to the surface and leave."

- id: lore_023_abandoned_campfire
  name: The Abandoned Camp
  dialogueNodes:
    start:
      text: "You find the remains of a recently abandoned campfire. Embers glow faintly beneath a pile of ash, and a worn leather journal lies beside a half-eaten, petrified meal. It looks like it was left in a hurry."
      options:
        - text: Read the journal.
          flow: dialogue_branch
          next_node_id: journal_entry_1
        - text: Search the campsite thoroughly.
          effect: item
          details: gold
          amount: 10
          responseText: "You sift through the ashes and find a few tarnished coins. Not much, but every piece counts."
          flow: dialogue_branch
        - text: Put out the embers and move on.
          result: none
          responseText: "You carefully douse the remaining embers. The wilderness can be unforgiving with unattended fires. You continue your journey."
        - text: 🗺️ Come back later.
          result: come_back_later
          responseText: "This point of interest has been marked on your map."
    journal_entry_1:
      text: "The journal's first page is dated weeks ago and appears to be marked with a '⚲' as if it's marking some sort importance: 'Day 1: The cartographers maps were right. The 'Missing Grotto' is real, just as the legends foretold. I'm camped near what they call the 'Quiet River Bend' now. Legend has it, this Grotto was a safe house for Pirates. There is a well known pirate shanty I sing to keep my spirits up: ⚲ 'A pi-rates life is ne-ver through, three, then one, then four, then two' ⚲ Next, I'll head ⚲ east along the riverbank. ⚲'"
      options:
        - text: Turn to the next entry.
          flow: dialogue_branch
          next_node_id: journal_entry_2
        - text: Close the journal for now.
          flow: close_encounter
          responseText: "You close the dusty journal, the prospector's initial excitement lingering in your mind."
    journal_entry_2:
      text: "Day 4: Spent days upstream and down. Found the landmark. It's exactly as described: a colossal ⚲ twin-trunked oak tree ⚲ on the eastern bank. The entrance is cunningly disguised, marked right at its base. Clever. From here, I need to focus on the ⚲ roots at the base of the tree. ⚲'"
      options:
        - text: Turn to the next entry.
          flow: dialogue_branch
          next_node_id: journal_entry_3
        - text: Close the journal for now.
          flow: close_encounter
          responseText: "You close the dusty journal, the prospector's excitement about the twin-trunked oak lingering in your mind."
    journal_entry_3:
      text: "Day 7: The grotto is breathtaking. The river truly weeps stone inside, stalactites shimmering like frozen tears. Reached the main chamber. Found an unusual boulder, with lines etched vertically. ⚲ I sing the Pirates Grotto Shanty.'"
      options:
        - text: Turn to the next entry.
          flow: dialogue_branch
          next_node_id: journal_entry_4
        - text: Close the journal for now.
          flow: close_encounter
          responseText: "You close the dusty journal, envisioning the shimmering magic of the grotto and the mysterious boulder."
    journal_entry_4:
      text: "Day 10: Beyond the boulder, there are two tunnels. The right leads back to the bigger river. The ⚲ left ⚲ seems to lead to a chamber with a chest. I heard those who used this grotto often locked their treasures using existing secrets but ⚲ adding, subtracting, multiplying, and then adding again... ⚲ whatever that means."
      options:
        - text: Turn to the next entry.
          flow: dialogue_branch
          next_node_id: journal_entry_5
        - text: Close the journal for now.
          flow: close_encounter
          responseText: "You close the dusty journal, pondering the riddle of the chest."
    journal_entry_5:
      text: "Finders note: I found this journal floating down the river. I leave it here in case the original owner has kin who would like the keep it. It is for certain the original owner did not survive whatever did them in. Whoever finds this, please put out my campfire if it's still going."
      options:
        - text: Close the journal.
          flow: quest_start
          quest_id: the_hidden_cache
          responseText: "You close the journal, the new prospector's words echoing in your mind. A complex grotto, a challenging chest, and a campfire to extinguish... your adventure truly begins now."
        - text: Go back to the first entry.
          flow: dialogue_branch
          next_node_id: journal_entry_1
