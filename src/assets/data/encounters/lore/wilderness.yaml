- id: lore_001
  name: The Warning
  text: "Etched into a cave wall: 'Beware the one-eyed owl who guards the dusk.'"
  options:
    - text: Poke the owl in the eye
      result: combat
      responseText: "The owl's eye snaps open. There is a deep and gravelly growl coming from behind..."
    - text: Keep walking
      result: none
      responseText: The forest remains silent.
    - text: Kick the owl in the eye
      result: combat
      responseText: "The owl's eye snaps open. There is a deep and gravelly growl coming from behind..."
    - text: Step away slowly
      result: none
      responseText: "The forest remains silent, but you feel the eye glaring at you."

- id: lore_002
  name: The Pit
  text: "There is what looks like a deep, dark pit about 10 feet ahead of you. As you step closer, you can hear the sound of rustling."
  options:
    - text: Jump in the hole. Fortune favors the bold.
      result: combat
      responseText: "...and the bold favor the afterlife."
    - text: Step around the pit.
      result: none
      responseText: "It's too risky. I better keep moving."
    - text: Demonstrate how dexterous you are by leaping over the pit
      result: damage-minor
      responseText: You jump the gap but land on your ankle and hurt yourself.
    - text: Throw a rock into the pit.
      result: combat
      responseText: "You hear the snarling intensify and see a creature climb up the pit. Before you know it, the creature is in front of you, looking deep into your eyes."

- id: lore_003
  name: The Glowing Herb
  text: There is a glowing herb sprouting from a crack in the rock.
  options:
    - text: Pick it out of the crack and use it for a glowing herb stew
      result: item
      details: health
      responseText: "'This is very good and VERY minty stew.'"
    - text: Eat it
      result: item
      details: health
      responseText: The herb tastes minty and you gain +5 HP.
    - text: Leave it alone
      result: none
      responseText: Maybe someone else will need it more.
    - text: Curse at the glowing herb
      result: none
      responseText: Nothing happens. Do you feel tough?

- id: lore_004
  name: The Overlook Rock
  text: You have reached a smooth rock overlooking the forest ahead.
  options:
    - text: Sit at the rock and contemplate your journey so far and plan for the journey ahead.
      result: special
      details: recover
      responseText: I wish I had a beer to crack and some Steely Dan to listen to, but this will do.
    - text: Throw a middle finger at the rock
      result: none
      responseText: "'What an ugly rock.'"
    - text: Appreciate the rock for what it is and move on.
      result: none
      responseText: "'I must continue on.'"
    - text: Pray upon the rock and thank the Gods for safety and health
      result: item
      details: health
      responseText: The sky grants temporary shade from the sun and you feel comforted.

- id: lore_005
  name: The Artifact
  text: "There is a large clearing in the forest that leads to a small lake where the sun's light dances endlessly. There is a small glowing artifact sticking out of the rocks and sand. It seems to shake harder the closer it is to a weapon..."
  options:
    - text: Pick it up and touch it to your weapon
      result: item
      details: weapon
      responseText: "The shaking stops and the artifact crumbles apart, leaving behind shards of dense, workable metal. You pocket them. 2 Scrap Metal."
    - text: Kick the rock into the lake
      result: damage-minor
      responseText: "The rock, still shaking, sails into the lake and disappears under the water. Your foot took damage."
    - text: Eat the rock
      result: none
      responseText: Your stomach shakes and shakes, but nothing substantial happens.
    - text: Leave it alone
      result: none
      responseText: "'I have no use for violently shaking rocks, to be quite honest.'"

- id: lore_006
  name: The Abandoned Forge
  text: "You find a pile of steel, an anvil, and a kiln all under a lean-to. It appears to be an old blacksmithing site that has since been abandoned. Everything under the lean-to seems to still be in working order."
  options:
    - text: Use the things under the lean-to on your weapon.
      result: item
      details: weapon
      responseText: "I should have been a blacksmith instead of an adventurer. You gather usable materials from the forge site. 2 Scrap Metal."
    - text: Continue on.
      result: none
      responseText: There are probably bugs and spiders in that mess. No thank you.
    - text: Start a new town, start a new life.
      result: none
      responseText: "You hang up your weapons, your boots, and your armor. You begin chopping trees one by one, create a lean-to against the biggest, closest tree you can find. By day, you chop trees, burn debris, rearrange rocks, and build on existing structures to reinforce their strength. At dusk, you find local game to sustain on: fish, deer, squirrel, wild boar. At night, you contemplate your next move. Should you start building a church to pray to your Gods? Should you start building a more sustainable home to live in? I bet down the road, a library and a general store would bring in people to your town. What should you name your town? Should you start a farm to prevent the local wildlife from dying out? You should get some sleep. Sleep would be good. You wake up on the 5th day. You decide none of this is worth it and move on in your journey."
    - text: Eat some of the steel.
      result: damage
      responseText: Why?

- id: lore_013
  name: The Swamp
  text: "You come across a bubbling swamp. The steam from the swamp is apparent and the smell is sulfuric and strong. There does appear to be a way around, but if you cut through the swamp, you might get hurt. However, you will save some time."
  options:
    - text: Walk carefully to the other side through the swamp.
      result: inventoryItem
      id: turkey_leg_consumable
      responseText: "You make it across, clothes drenched and skin stinging. On a mossy rock at the far bank sits a Turkey Leg. Someone must have dropped it."
    - text: Walk around the left side of the swamp
      result: combat
      responseText: There was an enemy waiting to ambush you on the left side.
    - text: Walk around the right side of the swamp
      effect: item
      details: gold
      amount: 30
      responseText: "You make it safely to the other side of the putrid swamp. While walking, you find a bag with 30 gold pieces in it."
    - text: "Take off all of your clothes, wrap them in your travel blanket, tie the blanket to your ankle, and swim like a graceful dolphin through the swamp."
      result: damage-major
      responseText: That was painful.

- id: lore_027_twin_trunked_oak
  name: The Twin-Trunked Oak
  dialogueNodes:
    start:
      text: "You find yourself at a section of the Silent River, flowing gently. The air is fresh, and the sound of distant birds fills the quiet. You notice several prominent landmarks nearby."
      options:
        - text: Search west, against the current.
          result: none
          responseText: You walk for a while, but the landscape feels unpromising. Nothing stands out.
        - text: Head east along the riverbank.
          flow: dialogue_branch
          next_node_id: step_1_riverbank_east
        - text: Cross the river to the opposite bank.
          result: damage-minor
          responseText: "The current is stronger than it looks, and you slip on a wet stone, scraping your knee. You manage to cross, but there's nothing of note on the other side. You give up."
        - text: Look for signs of a recent campsite nearby.
          result: none
          responseText: "You search for signs of recent activity, but this immediate area seems untouched."
        - text: Turn around and leave this area.
          flow: close_encounter
          responseText: "Feeling unsure, you decide to leave the river behind for now."
        - text: 🗺️ Come back later.
          result: come_back_later
          responseText: "This point of interest has been marked on your map."
    step_1_riverbank_east:
      text: "You follow the river east. After some time, a truly immense twin-trunked oak tree dominates the landscape on the eastern bank, just as a faded drawing might suggest. Its ancient roots sprawl, creating a network around its base."
      options:
        - text: Look for carvings on the tree trunks.
          result: none
          responseText: "The bark is ancient and deeply grooved, but there are no discernible carvings. This is a fool's errand. You give up."
        - text: Check the ground under the tree's canopy for anything hidden.
          result: item
          details: health
          responseText: "You find a patch of wild berries. A small snack, but nothing more. This is a fool's errand. You give up."
        - text: Walk around the tree to inspect it from all sides.
          result: none
          responseText: "You circle the massive oak, admiring its scale, but find no obvious secrets. You feel dizzy and decide to give up."
        - text: Examine the roots at the base of the tree.
          flow: dialogue_branch
          next_node_id: step_2_examine_roots
        - text: Turn around and leave this area.
          flow: close_encounter
          responseText: "Feeling unsure, you decide to leave the magnificent oak behind for now."
    step_2_examine_roots:
      text: "You meticulously examine the intricate root system at the base of the twin-trunked oak. After a few moments, your hand brushes against a section that feels hollow. With a gentle push, a camouflaged panel slides inward, revealing a dark, narrow passage leading down into the earth. The air immediately grows damp and cool."
      options:
        - text: Descend into the dark passage.
          result: open_explorer
          mapId: twintrunkedoak
        - text: Try to force the panel open further.
          result: damage-minor
          next_node_id: step_2_examine_roots
          responseText: "The panel grinds, and a shard of stone breaks off, cutting your hand. It's clear forcing it won't work."
        - text: Look for another way into the passage.
          result: none
          next_node_id: step_2_examine_roots
          responseText: "The passage seems to have only one, discreet entrance. You can't find another way in."
        - text: Reconsider and return to the surface.
          flow: dialogue_branch
          next_node_id: step_1_riverbank_east
        - text: Turn around and leave this area.
          flow: close_encounter
          responseText: "The darkness of the passage seems too daunting. You decide to leave this area."
